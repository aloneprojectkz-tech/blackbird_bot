version: "3.9"

services:
  blackbird:
    build: .
    container_name: blackbird_bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - RUN_MODE=both        # both | bot | web
      - WEB_PORT=5000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data     # persist downloaded wmn-data.json
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── To run only the bot (no web):
#   RUN_MODE=bot
#
# ── To run only the webapp:
#   RUN_MODE=web
#
# ── Scale: run bot + web in separate containers:
#   docker-compose up --scale blackbird=1
#   + add a second service with RUN_MODE=web
